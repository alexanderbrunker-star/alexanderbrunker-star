name: FlowBar
options:
  bundleIdPrefix: com.flowbar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  FlowBar:
    type: application
    platform: macOS
    sources:
      - path: FlowBar
        excludes:
          - "*.entitlements"
    resources:
      - path: FlowBar/Resources
        buildPhase: resources
    info:
      path: FlowBar/Info.plist
    entitlements:
      path: FlowBar/FlowBar.entitlements
    settings:
      PRODUCT_NAME: FlowBar
      PRODUCT_BUNDLE_IDENTIFIER: com.flowbar.app
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_STYLE: Automatic
      ENABLE_HARDENED_RUNTIME: YES
      GENERATE_INFOPLIST_FILE: NO
