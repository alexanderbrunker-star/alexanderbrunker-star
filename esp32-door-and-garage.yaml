  active: true

# =========================
# Globale Variablen für LED-Priorität
# =========================
globals:
  - id: summer_active
    type: bool
    initial_value: "false"
  - id: garage_active
    type: bool
    initial_value: "false"
  - id: pir_active
    type: bool
    initial_value: "false"

# =========================
# Logik & Timer Skripte
# =========================
script:
  - id: update_led
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(summer_active);'
          then:
            - light.turn_on:
                id: status_led
                red: 0.0
                green: 0.0
                blue: 1.0
                brightness: 1.0
                effect: "Pulse"
          else:
            - if:
                condition:
                  lambda: 'return id(garage_active);'
                then:
                  - light.turn_on:
                      id: status_led
                      red: 0.0
                      green: 1.0
                      blue: 0.0
                      brightness: 1.0
                      effect: "Pulse"
                else:
                  - if:
                      condition:
                        lambda: 'return id(pir_active);'
                      then:
                        - light.turn_on:
                            id: status_led
                            red: 1.0
                            green: 1.0
                            blue: 1.0
                            brightness: 1.0
                            effect: "None"
                      else:
                        - light.turn_off: status_led

  - id: pir_timer
    mode: restart
    then:
      - globals.set:
          id: pir_active
          value: "true"
      - script.execute: update_led
      - delay: 10s
      - globals.set:
          id: pir_active
          value: "false"
      - script.execute: update_led

  - id: summer_timer
    mode: restart
    then:
      - globals.set:
          id: summer_active
          value: "true"
      - script.execute: update_led
      - delay: 3s
      - globals.set:
          id: summer_active
          value: "false"
      - script.execute: update_led

  - id: garage_trigger_timer
    mode: restart
    then:
      - globals.set:
          id: garage_active
          value: "true"
      - script.execute: update_led
      - delay: 5s
      - globals.set:
          id: garage_active
          value: "false"
      - script.execute: update_led

# =========================
# Relais
# =========================
switch:
  - platform: gpio
    pin: 16
    id: tuer_summer
    name: "Tür Summer"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: summer_timer
      - delay: 500ms
      - switch.turn_off: tuer_summer

  - platform: gpio
    pin: 17
    id: garage_trigger
    name: "Garage Trigger"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: garage_trigger_timer
      - delay: 800ms
      - switch.turn_off: garage_trigger

# =========================
# PIR Bewegungsmelder (HC-SR501)
# =========================
binary_sensor:
  - platform: gpio
    pin:
      number: 21
      mode: INPUT 
    name: "PIR Bewegung"
    device_class: motion
    on_press:
      - script.execute: pir_timer

# =========================
# RGB LED (Common Cathode)
# =========================
output:
  - platform: ledc
    pin: 32
    id: pwm_r
  - platform: ledc
    pin: 33
    id: pwm_g
  - platform: ledc
    pin: 25
    id: pwm_b

light:
  - platform: rgb
    name: "Status LED"
    id: status_led
    red: pwm_r
    green: pwm_g
    blue: pwm_b
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 500ms
          update_interval: 500ms